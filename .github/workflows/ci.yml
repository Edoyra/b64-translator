name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: BUILD & TEST (Docker)
  # ─────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Compose
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: sleep 10

      - name: Health check - Nginx
        run: curl -f http://localhost || exit 1

      - name: Health check - Flask API
        run: curl -f http://localhost/api/ || exit 1

      - name: Test encode endpoint
        run: |
          curl -f -X POST http://localhost/api/encode \
            -H "Content-Type: application/json" \
            -d '{"text": "hello"}' || exit 1

      - name: Test decode endpoint
        run: |
          curl -f -X POST http://localhost/api/decode \
            -H "Content-Type: application/json" \
            -d '{"text": "aGVsbG8="}' || exit 1

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down

  # ─────────────────────────────
  # JOB 2: CODEQL SECURITY SCAN
  # ─────────────────────────────
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
