name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ─────────────────────────────
  # JOB 1: BUILD & TEST (Docker)
  # ─────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Compose
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: sleep 10

      - name: Health check - Nginx
        run: curl -f http://localhost:8080 || exit 1

      - name: Health check - Flask API
        run: curl -f http://localhost:8080/api/health || exit 1

      - name: Test encode endpoint
        run: |
          RESULT=$(curl -s -X POST http://localhost:8080/api/encode \
            -H "Content-Type: application/json" \
            -d '{"text": "hello"}')
          echo "Encode result: $RESULT"
          echo $RESULT | grep -q '"success":true' || exit 1

      - name: Test decode endpoint
        run: |
          RESULT=$(curl -s -X POST http://localhost:8080/api/decode \
            -H "Content-Type: application/json" \
            -d '{"text": "aGVsbG8="}')
          echo "Decode result: $RESULT"
          echo $RESULT | grep -q '"success":true' || exit 1

      - name: Test decode returns correct value
        run: |
          RESULT=$(curl -s -X POST http://localhost:8080/api/decode \
            -H "Content-Type: application/json" \
            -d '{"text": "aGVsbG8="}')
          echo $RESULT | grep -q '"result":"hello"' || exit 1

      - name: Test missing field returns error
        run: |
          RESULT=$(curl -s -X POST http://localhost:8080/api/encode \
            -H "Content-Type: application/json" \
            -d '{}')
          echo $RESULT | grep -q '"success":false' || exit 1

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down

  # ─────────────────────────────
  # JOB 2: CODEQL SECURITY SCAN
  # ─────────────────────────────
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
